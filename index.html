<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Murray & Friends Basketball Training Plan</title>
<style>
  :root {
    --orange: #FF6B2B;
    --orange-light: #FF8F5A;
    --orange-dark: #E0551A;
    --bg: #FFFFFF;
    --bg-page: #F9F4F5;
    --card-bg: #FFFFFF;
    --card-hover: #FAFAFA;
    --border: #E8ECF2;
    --border-strong: #D0D8E4;
    --text-primary: #1A1E2E;
    --text-secondary: #4A5568;
    --text-muted: #8896A8;
    --accent-green: #18A96A;
    --accent-blue: #2563EB;
    --accent-yellow: #D97706;
    --accent-red: #DC2626;
    --accent-purple: #7C3AED;
    --shadow-sm: 0 1px 4px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Segoe UI', sans-serif;
    background: var(--bg-page);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== HEADER ===== */
  .app-header {
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    height: 64px;
    box-shadow: var(--shadow-sm);
  }

  .header-left { display: flex; align-items: center; gap: 12px; }

  .app-logo {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--orange), var(--orange-dark));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    box-shadow: 0 4px 12px rgba(255,107,43,0.3);
  }

  .app-title { font-size: 17px; font-weight: 700; color: var(--text-primary); }
  .app-subtitle { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

  /* Language switcher */
  .lang-switcher {
    display: flex;
    background: var(--bg-page);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .lang-btn {
    padding: 7px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--text-muted);
    transition: all 0.2s;
    display: flex; align-items: center; gap: 5px;
  }
  .lang-btn.active {
    background: var(--orange);
    color: white;
  }
  .lang-btn:hover:not(.active) { color: var(--text-primary); background: var(--border); }

  /* ===== MAIN LAYOUT ===== */
  .main-container {
    max-width: 960px;
    margin: 0 auto;
    padding: 28px 20px 80px;
  }

  /* ===== SCREENS ===== */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ===== INPUT SCREEN ===== */
  .input-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 16px;
    box-shadow: var(--shadow-sm);
  }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.2px;
    color: var(--orange);
    text-transform: uppercase;
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }
  @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }

  .form-group { display: flex; flex-direction: column; gap: 10px; }

  .form-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    display: flex; align-items: center; gap: 7px;
  }

  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 5px;
    background: var(--border);
    border-radius: 3px;
    outline: none;
    cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px; height: 20px;
    background: var(--orange);
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(255,107,43,0.4);
    transition: transform 0.15s;
    border: 3px solid white;
  }
  input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.15); }

  .slider-value {
    display: inline-block;
    background: linear-gradient(135deg, var(--orange), var(--orange-dark));
    color: white;
    font-weight: 700;
    font-size: 13px;
    padding: 3px 12px;
    border-radius: 20px;
    margin-top: 6px;
  }

  .option-group {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .option-btn {
    padding: 7px 15px;
    border: 1.5px solid var(--border-strong);
    border-radius: 20px;
    background: var(--bg);
    color: var(--text-secondary);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s;
  }
  .option-btn:hover { border-color: var(--orange); color: var(--orange); background: rgba(255,107,43,0.04); }
  .option-btn.selected {
    background: var(--orange);
    border-color: var(--orange);
    color: white;
    box-shadow: 0 3px 10px rgba(255,107,43,0.25);
  }

  /* ===== GENERATE BUTTON ===== */
  .generate-btn {
    width: 100%;
    padding: 17px;
    background: linear-gradient(135deg, var(--orange), var(--orange-dark));
    border: none;
    border-radius: 14px;
    color: white;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    box-shadow: 0 6px 20px rgba(255,107,43,0.35);
    margin-top: 4px;
  }
  .generate-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(255,107,43,0.45); }
  .generate-btn:active { transform: translateY(0); }

  /* ===== LOADING ===== */
  .loading-screen {
    display: none;
    text-align: center;
    padding: 100px 20px;
  }
  .loading-screen.active { display: block; }

  .loader {
    width: 52px; height: 52px;
    border: 4px solid var(--border);
    border-top-color: var(--orange);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 24px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text { font-size: 17px; font-weight: 600; color: var(--text-secondary); }
  .loading-sub { font-size: 13px; color: var(--text-muted); margin-top: 8px; }

  /* ===== RESULT SCREEN ===== */

  /* --- Summary Banner --- */
  .summary-banner {
    background: linear-gradient(135deg, var(--orange) 0%, #C0392B 100%);
    border-radius: 16px;
    padding: 28px 32px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 6px 24px rgba(255,107,43,0.3);
  }
  .summary-banner::after {
    content: '🏀';
    position: absolute;
    right: 24px; top: 50%;
    transform: translateY(-50%);
    font-size: 88px;
    opacity: 0.12;
    pointer-events: none;
  }
  .summary-banner h2 { font-size: 22px; font-weight: 800; color: white; margin-bottom: 6px; }
  .summary-banner p { font-size: 14px; color: rgba(255,255,255,0.88); margin-bottom: 18px; }
  .summary-stats { display: flex; gap: 10px; flex-wrap: wrap; }
  .stat-pill {
    background: rgba(255,255,255,0.22);
    border-radius: 20px;
    padding: 5px 13px;
    font-size: 13px;
    font-weight: 600;
    color: white;
    backdrop-filter: blur(4px);
  }

  /* --- Goals Card --- */
  .goals-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 16px;
    box-shadow: var(--shadow-sm);
  }

  .goals-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-top: 16px;
  }
  @media (max-width: 600px) { .goals-grid { grid-template-columns: 1fr 1fr; } }

  .goal-item {
    background: var(--bg-page);
    border-radius: 12px;
    padding: 16px 12px;
    text-align: center;
    border: 1px solid var(--border);
    transition: box-shadow 0.2s;
  }
  .goal-item:hover { box-shadow: var(--shadow-md); }
  .goal-icon { font-size: 26px; margin-bottom: 8px; }
  .goal-title { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; font-weight: 500; }
  .goal-value { font-size: 14px; font-weight: 700; color: var(--text-primary); }

  /* --- Calendar --- */
  .calendar-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 16px;
    box-shadow: var(--shadow-sm);
  }

  .day-tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 16px;
  }

  .day-tab {
    padding: 8px 12px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: var(--bg);
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    min-width: 52px;
  }
  .day-tab .day-num { font-size: 10px; opacity: 0.75; }
  .day-tab:hover { border-color: var(--orange-light); color: var(--orange); background: rgba(255,107,43,0.04); }
  .day-tab.active { background: var(--orange); border-color: var(--orange); color: white; box-shadow: 0 3px 10px rgba(255,107,43,0.3); }
  .day-tab.rest { border-color: #BFDBFE; color: var(--accent-blue); }
  .day-tab.rest.active { background: var(--accent-blue); border-color: var(--accent-blue); color: white; box-shadow: 0 3px 10px rgba(37,99,235,0.3); }
  .day-tab.light { border-color: #BBF7D0; color: var(--accent-green); }
  .day-tab.light.active { background: var(--accent-green); border-color: var(--accent-green); color: white; box-shadow: 0 3px 10px rgba(24,169,106,0.3); }

  /* --- Daily Detail --- */
  .daily-detail {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 16px;
    box-shadow: var(--shadow-sm);
  }

  .daily-header {
    display: flex; align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap; gap: 12px;
  }

  .daily-title { font-size: 20px; font-weight: 800; color: var(--text-primary); }
  .daily-theme-badge {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
  }

  .daily-goals {
    background: var(--bg-page);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 20px;
    border: 1px solid var(--border);
  }
  .daily-goals h4 { font-size: 12px; color: var(--orange); font-weight: 700; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.8px; }
  .goal-list { list-style: none; display: flex; flex-direction: column; gap: 7px; }
  .goal-list li { font-size: 13px; color: var(--text-secondary); display: flex; align-items: flex-start; gap: 8px; }
  .goal-list li::before { content: '✓'; color: var(--accent-green); font-weight: 700; flex-shrink: 0; margin-top: 1px; }

  /* --- Timeline --- */
  .timeline { position: relative; padding-left: 22px; }
  .timeline::before {
    content: '';
    position: absolute;
    left: 7px; top: 8px; bottom: 8px;
    width: 2px;
    background: var(--border);
    border-radius: 1px;
  }

  .timeline-block { position: relative; margin-bottom: 18px; }
  .timeline-block::before {
    content: '';
    position: absolute;
    left: -18px; top: 12px;
    width: 10px; height: 10px;
    border-radius: 50%;
    border: 2px solid white;
    box-shadow: 0 0 0 1px var(--border);
  }
  .timeline-block.warmup::before   { background: #D97706; }
  .timeline-block.skill::before    { background: var(--orange); }
  .timeline-block.tech::before     { background: var(--accent-purple); }
  .timeline-block.fitness::before  { background: var(--accent-green); }
  .timeline-block.core::before     { background: var(--accent-blue); }
  .timeline-block.cooldown::before { background: var(--text-muted); }

  .block-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 10px;
  }
  .block-time {
    font-size: 11px; font-weight: 700; color: var(--text-muted);
    font-variant-numeric: tabular-nums;
    min-width: 95px;
    background: var(--bg-page);
    padding: 2px 8px;
    border-radius: 5px;
    border: 1px solid var(--border);
  }
  .block-title { font-size: 15px; font-weight: 700; flex: 1; color: var(--text-primary); }
  .block-duration {
    font-size: 12px; color: var(--text-muted);
    background: var(--bg-page);
    padding: 3px 10px; border-radius: 10px;
    border: 1px solid var(--border);
  }

  .block-content {
    background: var(--bg-page);
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .exercise-row {
    display: grid;
    grid-template-columns: 1fr auto auto auto;
    align-items: center;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    gap: 10px;
    transition: background 0.12s;
  }
  .exercise-row:last-child { border-bottom: none; }
  .exercise-row:hover { background: rgba(255,107,43,0.03); }
  .ex-name { font-size: 13px; font-weight: 500; color: var(--text-primary); }
  .ex-detail { font-size: 12px; color: var(--orange); font-weight: 700; white-space: nowrap; }
  .ex-rest { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
  .ex-intensity { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .intensity-low  { background: var(--accent-green); }
  .intensity-med  { background: var(--accent-yellow); }
  .intensity-high { background: var(--orange); }
  .intensity-max  { background: var(--accent-red); }

  /* --- Back Button --- */
  .back-btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 9px 16px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text-secondary);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s;
    margin-bottom: 20px;
  }
  .back-btn:hover { background: var(--bg-page); color: var(--text-primary); border-color: var(--border-strong); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }

  /* Animations */
  .fade-in { animation: fadeIn 0.35s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .rest-day-box {
    text-align: center;
    padding: 52px 24px;
    background: var(--bg-page);
    border-radius: 12px;
    border: 1px solid var(--border);
  }
  .rest-day-box .big-icon { font-size: 56px; margin-bottom: 16px; }
  .rest-day-box h3 { font-size: 20px; font-weight: 800; margin-bottom: 8px; color: var(--text-primary); }
  .rest-day-box p { font-size: 13px; color: var(--text-secondary); max-width: 340px; margin: 0 auto; line-height: 1.7; }

  .tip-box {
    background: rgba(255,107,43,0.05);
    border: 1px solid rgba(255,107,43,0.2);
    border-radius: 10px;
    padding: 13px 16px;
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 16px;
    line-height: 1.6;
  }
  .tip-box strong { color: var(--orange); }

  /* ===== INTRO TEXT ===== */
  .page-intro {
    margin-bottom: 24px;
  }
  .page-intro h1 {
    font-size: 26px;
    font-weight: 800;
    color: var(--text-primary);
    margin-bottom: 6px;
  }
  .page-intro p {
    font-size: 14px;
    color: var(--text-muted);
  }

  /* ===== PLAYER COUNT SELECTOR ===== */
  .player-count-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px 28px;
    margin-bottom: 16px;
    box-shadow: var(--shadow-sm);
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }
  .player-count-label {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 8px;
    white-space: nowrap;
  }
  .player-count-btns {
    display: flex;
    gap: 8px;
  }
  .count-btn {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    border: 2px solid var(--border-strong);
    background: var(--bg);
    color: var(--text-secondary);
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.18s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .count-btn:hover { border-color: var(--orange); color: var(--orange); background: rgba(255,107,43,0.05); }
  .count-btn.active {
    background: var(--orange);
    border-color: var(--orange);
    color: white;
    box-shadow: 0 3px 12px rgba(255,107,43,0.3);
  }

  /* ===== PLAYER TABS (input) ===== */
  .player-tabs-row {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .player-tab-btn {
    padding: 8px 18px;
    border-radius: 10px;
    border: 2px solid var(--border);
    background: var(--bg);
    color: var(--text-muted);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .player-tab-btn:hover { border-color: var(--orange-light); color: var(--orange); }
  .player-tab-btn.active {
    background: var(--orange);
    border-color: var(--orange);
    color: white;
    box-shadow: 0 3px 10px rgba(255,107,43,0.3);
  }
  .player-avatar {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    background: rgba(255,255,255,0.3);
  }
  .player-tab-btn:not(.active) .player-avatar {
    background: var(--border);
    color: var(--text-muted);
  }

  /* Player name input */
  .player-name-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    padding: 10px 14px;
    background: var(--bg-page);
    border-radius: 10px;
    border: 1px solid var(--border);
  }
  .player-name-row label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    white-space: nowrap;
  }
  .player-name-input {
    flex: 1;
    border: none;
    background: transparent;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    outline: none;
    min-width: 0;
  }
  .player-name-input::placeholder { color: var(--text-muted); font-weight: 400; }

  /* ===== RESULT: TEAM TABS ===== */
  .team-tabs-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .team-tab-btn {
    padding: 9px 20px;
    border-radius: 10px;
    border: 2px solid var(--border);
    background: var(--bg);
    color: var(--text-muted);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.18s;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .team-tab-btn:hover { border-color: var(--orange-light); color: var(--orange); }
  .team-tab-btn.active {
    background: var(--orange);
    border-color: var(--orange);
    color: white;
    box-shadow: 0 3px 10px rgba(255,107,43,0.3);
  }
  .team-tab-btn.team-tab {
    border-color: #A78BFA;
    color: #7C3AED;
  }
  .team-tab-btn.team-tab.active {
    background: linear-gradient(135deg, #7C3AED, #A78BFA);
    border-color: #7C3AED;
    color: white;
    box-shadow: 0 3px 10px rgba(124,58,237,0.3);
  }

  /* ===== TEAM EXERCISE section ===== */
  .team-section-banner {
    background: linear-gradient(135deg, #7C3AED 0%, #A78BFA 100%);
    border-radius: 14px;
    padding: 20px 24px;
    margin-bottom: 16px;
    color: white;
    position: relative;
    overflow: hidden;
    box-shadow: 0 4px 16px rgba(124,58,237,0.25);
  }
  .team-section-banner::after {
    content: '🤝';
    position: absolute;
    right: 20px; top: 50%;
    transform: translateY(-50%);
    font-size: 56px;
    opacity: 0.15;
  }
  .team-section-banner h3 { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
  .team-section-banner p { font-size: 13px; opacity: 0.88; }

  .team-drill-block {
    background: var(--card-bg);
    border: 1px solid var(--border);

function setLang(lang) {
  currentLang = lang;
  const s = STRINGS[lang];

  document.getElementById('headerTitle').textContent = s.headerTitle;
  document.getElementById('headerSub').textContent = s.headerSub;
  document.getElementById('introTitle').textContent = s.introTitle;
  document.getElementById('introSub').textContent = s.introSub;
  const exportLbl = document.getElementById('exportLabel');
  if (exportLbl) exportLbl.textContent = s.exportBtn || '导出 / 打印';

  document.getElementById('btnZH').classList.toggle('active', lang === 'zh');
  document.getElementById('btnPT').classList.toggle('active', lang === 'pt');
  document.getElementById('btnEN').classList.toggle('active', lang === 'en');

  const langMap = { zh:'zh-CN', pt:'pt-PT', en:'en-GB' };
  document.documentElement.lang = langMap[lang] || 'en';

  // Rebuild player panels in new language
  initPlayerPanels();
}

function setPlayerCount(count) {
  currentPlayerCount = count;
  document.querySelectorAll('.count-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.count) === count);
  });
  const tabsRow = document.getElementById('playerTabsRow');
  tabsRow.style.display = count > 1 ? 'flex' : 'none';
  initPlayerPanels();
}

function initPlayerPanels() {
  const count = currentPlayerCount;
  const s = STRINGS[currentLang];

  // Update player tabs
  const tabsRow = document.getElementById('playerTabsRow');
  if (tabsRow) {
    const dnames = currentLang==='zh' ? ['玩家1','玩家2','玩家3','玩家4','玩家5']
                 : currentLang==='pt' ? ['Jogador 1','Jogador 2','Jogador 3','Jogador 4','Jogador 5']
                 : ['Player 1','Player 2','Player 3','Player 4','Player 5'];
    tabsRow.innerHTML = Array.from({length: count}, (_, i) => {
      return `<button class="player-tab-btn${i===0?' active':''}" id="ptab_${i}" onclick="switchPlayerPanel(${i})">
        <span class="player-avatar">${PLAYER_EMOJIS[i]}</span>
        <span id="ptab_name_${i}">${dnames[i]}</span>
      </button>`;
    }).join('');
  }

  // Render player panels
  const panelsContainer = document.getElementById('playerPanels');
  if (!panelsContainer) return;
  panelsContainer.innerHTML = Array.from({length: count}, (_, i) => buildPlayerPanel(i, s, i===0)).join('');

  // Show only panel 0
  for (let i = 0; i < count; i++) {
    const p = document.getElementById(`playerPanel_${i}`);
    if (p) p.style.display = i === 0 ? 'block' : 'none';
  }

  // Bind option btn events for all panels
  document.querySelectorAll('.option-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const pid = parseInt(btn.dataset.pid);
      const group = btn.dataset.group;
      document.querySelectorAll(`.option-btn[data-pid="${pid}"][data-group="${group}"]`).forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      playerSelections[pid] = playerSelections[pid] || {};
      const val = btn.dataset.val;
      // Store as-is; generatePlan will normalise to ZH
      playerSelections[pid][group] = val;
    });
  });

  // Name inputs: sync tab name
  for (let i = 0; i < count; i++) {
    const ni = document.getElementById(`p${i}_name`);
    if (ni) {
      ni.addEventListener('input', () => {
        const tabNameEl = document.getElementById(`ptab_name_${i}`);
        if (tabNameEl) tabNameEl.textContent = ni.value.trim() || (s.playerDefaultNames?.[i] || `Player ${i+1}`);
      });
    }
    // Init sliders
    ['age','years','days','minutes'].forEach(id => {
      updatePlayerSlider(i, id, id+'Val');
    });
  }
}

function getLevel(age, years) {
  const base = years + (age - 8) * 0.3;
  if (base < 1.5) return 'L1';
  if (base < 4)   return 'L2';
  if (base < 8)   return 'L3';
  return 'L4';
}

function getTheme(dayIndex, goalZH) {
  const s = STRINGS[currentLang];
  if (currentLang === 'pt') {
    const ptGoalMap = { '综合':null,'控球':'Dribble','投篮':'Arremesso','体能':'Físico' };
    const ptGoal = PT_TO_ZH_GOAL[goalZH] ? goalZH : (ptGoalMap[goalZH] || null);
    const ptKey = ptGoal || goalZH;
    if (s.themesGoalMap[ptKey]) return s.themesGoalMap[ptKey][dayIndex % 7];
    return s.themes[dayIndex % 7];
  }
  if (currentLang === 'en') {
    const enGoalMap = { '综合':'All-round','控球':'Ball handling','投篮':'Shooting','体能':'Fitness' };
    const enKey = EN_TO_ZH_GOAL[goalZH] ? goalZH : (enGoalMap[goalZH] || 'All-round');
    if (s.themesGoalMap[enKey]) return s.themesGoalMap[enKey][dayIndex % 7];
    return s.themes[dayIndex % 7];
  }
  const zhThemes = STRINGS.zh.themes;
  const zhMap = STRINGS.zh.themesGoalMap;
  if (zhMap[goalZH]) return zhMap[goalZH][dayIndex % 7];
  return zhThemes[dayIndex % 7];
}

function getThemeZH(themeDisplay) {
  // Convert displayed theme back to ZH key for engine logic
  const ptToZH = {
    'Dribble':'控球基础','Passos e Equilíbrio':'脚步与平衡','Arremesso':'出手手型',
    'Jogo Combinado':'综合实战','Recuperação Leve':'轻松恢复','Desafio Intenso':'强化挑战','Descanso Total':'完全休息'
  };
  const enToZH = {
    'Ball Handling':'控球基础','Footwork & Balance':'脚步与平衡','Shooting Form':'出手手型',
    'Game Simulation':'综合实战','Active Recovery':'轻松恢复','Intensity Challenge':'强化挑战','Full Rest':'完全休息'
  };
  return ptToZH[themeDisplay] || enToZH[themeDisplay] || themeDisplay;
}

function getProgression(dayIndex) {
  const week = Math.floor(dayIndex / 7);
  return { setBonus: week, timeBonus: week * 5 };
}

function isRestTheme(theme) {
  return theme === '完全休息' || theme === 'Descanso Total' || theme === 'Full Rest';
}
function isLightTheme(theme) {
  return theme === '轻松恢复' || theme === 'Recuperação Leve' || theme === 'Active Recovery';
}

function fmtTime(min) {
  return `${String(Math.floor(min)).padStart(2,'0')}:${String(Math.round((min%1)*60)).padStart(2,'0')}`;
}

function buildDay(dayIndex, params) {
  const { age, years, totalMin, goal, hoop, fitness } = params;
  const level = getLevel(age, years);
  const theme = getTheme(dayIndex, goal);
  const prog = getProgression(dayIndex);
  const s = STRINGS[currentLang];

  const isRest = isRestTheme(theme);
  const isLight = isLightTheme(theme);
  const themeZH = getThemeZH(theme);

  if (isRest) {
    return { dayIndex, theme, isRest: true, title: s.restTitle, tips: s.restTips };
  }

  // Determine hoop state
  const hoopZH = currentLang === 'pt' ? (PT_TO_ZH_HOOP[hoop] || '无')
               : currentLang === 'en' ? (EN_TO_ZH_HOOP[hoop] || '无')
               : hoop;
  const fitnessZH = currentLang === 'pt' ? (PT_TO_ZH_FITNESS[fitness] || '中等')
                  : currentLang === 'en' ? (EN_TO_ZH_FITNESS[fitness] || '中等')
                  : fitness;

  // ---- 按年龄过滤动作难度 ----
  function filterByAge(exercises, minAge) {
    return exercises.filter(ex => !ex._minAge || age >= ex._minAge);
  }

  // ---- 基础比例分配（按 level 定基准），然后等比缩放到 totalMin ----
  const baseWarm  = level === 'L1' ? 8  : 10;
  const baseSkill = { L1:10, L2:12, L3:14, L4:16 }[level];
  const baseTech  = { L1:12, L2:15, L3:17, L4:20 }[level];
  const baseFit   = isLight ? Math.floor({ L1:8, L2:10, L3:12, L4:14 }[level] * 0.6)
                            : { L1:8, L2:10, L3:12, L4:14 }[level];
  const baseCore  = 8;
  const baseCool  = 5;
  const baseTotal = baseWarm + baseSkill + baseTech + baseFit + baseCore + baseCool;

  // 缩放因子，确保总时长 = totalMin
  const scale = totalMin / baseTotal;
  function sc(v) { return Math.max(1, Math.round(v * scale)); }

  const warmDur  = sc(baseWarm);
  const skillDur = sc(baseSkill);
  const techDur  = sc(baseTech);
  const fitDur   = sc(baseFit);
  const coreDur  = sc(baseCore);
  // 剩余时间全给 cooldown，避免四舍五入导致总时长偏差
  const coolDur  = totalMin - warmDur - skillDur - techDur - fitDur - coreDur;

  let cursor = 0;
  const blocks = [];

  // --- WARMUP ---
  blocks.push({ type: 'warmup', title: s.blockTitles.warmup, dur: warmDur, startMin: cursor,
    exercises: s.exercises.warmupList(warmDur) });
  cursor += warmDur;

  // --- SKILL ---
  const tExtra = 50 + prog.timeBonus;
  let skillEx;
  if (themeZH === '出手手型') skillEx = s.exercises.skillShoot;
  else skillEx = s.exercises.skillDribble(tExtra, level, age);
  blocks.push({ type: 'skill', title: s.blockTitles.skill, dur: skillDur, startMin: cursor, exercises: skillEx });
  cursor += skillDur;

  // --- TECH ---
  const sets = (level === 'L1' ? 3 : level === 'L2' ? 4 : 5) + prog.setBonus;
  const t1 = 30 + prog.timeBonus, t2 = 40 + prog.timeBonus;
  let techEx;
  if (themeZH === '控球基础') techEx = s.exercises.techControl(sets, t1, t2, age);
  else if (themeZH === '脚步与平衡') techEx = s.exercises.techFootwork(sets, t1, age);
  else if (themeZH === '出手手型') {
    const r1=40+prog.setBonus*10, r2=30+prog.setBonus*5;
    const r3 = hoopZH==='有' ? 15+prog.setBonus*3 : 20+prog.setBonus*5;
    techEx = s.exercises.techShoot(sets,r1,r2,r3,
      currentLang==='pt' ? (hoopZH==='有'?'Com aro':'Sem aro')
      : currentLang==='en' ? (hoopZH==='有'?'Have a hoop':'No hoop')
      : hoopZH);
  } else if (themeZH === '综合实战' || themeZH === '强化挑战') {
    techEx = s.exercises.techCombined(sets, t1, t2, themeZH==='强化挑战'?1:0, age);
  } else if (isLight) {
    techEx = s.exercises.techLight;
  } else {
    techEx = s.exercises.techControl(sets, t1, t2, age);
  }
  blocks.push({ type: 'tech', title: s.blockTitles.tech, dur: techDur, startMin: cursor, exercises: techEx });
  cursor += techDur;

  // --- FITNESS ---
  const rounds = isLight ? 6 : ((level==='L1'?8:10)+prog.setBonus);
  const workSec = fitnessZH==='较强'?25:fitnessZH==='中等'?20:15;
  const restSec = fitnessZH==='较强'?15:fitnessZH==='中等'?20:25;
  const moves = s.exercises.fitnessMoves(level, isLight, age);
  const sel = []; for (let i=0;i<rounds;i++) sel.push(moves[i%moves.length]);
  const grouped = []; let cur2 = null;
  sel.forEach(m => { if(cur2&&cur2.name===m){cur2.rounds++;}else{cur2={name:m,rounds:1};grouped.push(cur2);} });
  const fitEx = grouped.map(g => ({
    name: g.name,
    detail: s.fitDetail(workSec, g.rounds),
    rest: s.fitRest(restSec),
    intensity: isLight?'med':'high'
  }));
  blocks.push({ type: 'fitness', title: s.blockTitles.fitness, dur: fitDur, startMin: cursor, exercises: fitEx });
  cursor += fitDur;

  // --- CORE ---
  if (!isLight) {
    const coreRounds = level==='L1'?2:3;
    blocks.push({ type:'core', title:s.blockTitles.core, dur: coreDur, startMin:cursor, exercises:s.exercises.coreMain(coreRounds) });
  } else {
    blocks.push({ type:'core', title:s.blockTitles.coreLight, dur: coreDur, startMin:cursor, exercises:s.exercises.coreLight });
  }
  cursor += coreDur;

  // --- COOLDOWN ---
  blocks.push({ type:'cooldown', title:s.blockTitles.cooldown, dur: coolDur, startMin:cursor, exercises:s.exercises.cooldown });
  cursor += coolDur;

  const goals = s.dayGoals(theme,
    currentLang==='pt' ? (hoopZH==='有'?'Com aro':'Sem aro')
    : currentLang==='en' ? (hoopZH==='有'?'Have a hoop':'No hoop')
    : hoopZH);

  return { dayIndex, theme, themeZH, level, isRest:false, isLight, blocks, goals, totalActual:cursor };
}

      { icon:'⚡', title:'Partner Passing Warm-Up', duration:8, desc:'<strong>Passing drills</strong>: ' + (is4 ? 'split into two groups — ' : 'stand 3-4 m apart — ') + 'chest pass 2 min → bounce pass 2 min → overhead pass 2 min.' + (is5 ? ' With 5 players, add a triangle passing rotation.' : '') },

        : '<strong>Offense</strong>: start at the free-throw line and try to beat the defender. <strong>Defense</strong>: maintain stance — no fouling. Rotate every 45s.' + (is3 ? ' Third player keeps score and waits their turn.' : '') + (hasHoop ? ' Offense can shoot to score.' : ' Reaching the key counts as a score.') },

  return (drills2[lang] || drills2.en);
}

function renderDay(day, playerIdx) {
  playerIdx = playerIdx || 0;
  const s = STRINGS[currentLang];
  const container = document.getElementById('dailyDetail');
  container.innerHTML = '';
  container.classList.remove('fade-in');
  void container.offsetWidth;
  container.classList.add('fade-in');

  if (day.isRest) {
    const thStyle = THEME_COLORS[day.theme] || { bg:'rgba(37,99,235,0.10)', color:'#2563EB' };
    container.innerHTML = `
      <div class="daily-detail">
        <div class="daily-header">
          <div><div class="daily-title">Day ${day.dayIndex+1} · ${day.title}</div></div>
          <div class="daily-theme-badge" style="background:${thStyle.bg};color:${thStyle.color}">😴 ${day.title}</div>
        </div>
        <div class="rest-day-box">
          <div class="big-icon">🛌</div>
          <h3>${s.restH3}</h3>
          <p>${day.tips.join('<br>')}</p>
        </div>
        ${renderCheckinArea(playerIdx, day.dayIndex, s)}
        ${renderNotesArea(playerIdx, day.dayIndex, s)}
      </div>`;
    updateCheckinBtn(playerIdx, day.dayIndex);
    bindNotesArea(playerIdx, day.dayIndex);
    return;
  }

  const thStyle = THEME_COLORS[day.theme] || { bg:'rgba(255,107,43,0.10)', color:'#E0551A' };

  let html = `<div class="daily-detail">
    <div class="daily-header">
      <div>
        <div class="daily-title">Day ${day.dayIndex+1} · ${day.theme}</div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:4px">${s.estimateLabel} ${day.totalActual} ${s.minLabel}</div>
      </div>
      <div class="daily-theme-badge" style="background:${thStyle.bg};color:${thStyle.color}">${day.theme}</div>
    </div>`;

  if (day.goals.length > 0) {
    html += `<div class="daily-goals">
      <h4>${s.todayGoalLabel}</h4>
      <ul class="goal-list">${day.goals.map(g=>`<li>${g}</li>`).join('')}</ul>
    </div>`;
  }

  html += `<div class="timeline">`;
  day.blocks.forEach(block => {
    const endMin = block.startMin + block.dur;
    html += `<div class="timeline-block ${block.type}">
      <div class="block-header">
        <span class="block-time">${fmtTime(block.startMin)} – ${fmtTime(endMin)}</span>
        <span class="block-title">${block.title}</span>
        <span class="block-duration">${block.dur} ${s.minLabel}</span>
      </div>
      <div class="block-content">
        ${block.exercises.map(ex=>`
          <div class="exercise-row">
            <span class="ex-name">${ex.name}</span>
            <span class="ex-detail">${ex.detail}</span>
            <span class="ex-rest">${ex.rest}</span>
            <span class="ex-intensity intensity-${ex.intensity}"></span>
          </div>`).join('')}
      </div>
    </div>`;
  });
  html += `</div>`;

  const tip = s.tips[day.theme];
  if (tip) html += `<div class="tip-box"><strong>${s.coachTip}</strong>${tip}</div>`;

  html += renderCheckinArea(playerIdx, day.dayIndex, s);
  html += renderNotesArea(playerIdx, day.dayIndex, s);
  html += `</div>`;
  container.innerHTML = html;
  updateCheckinBtn(playerIdx, day.dayIndex);
  bindNotesArea(playerIdx, day.dayIndex);
}

function renderCheckinArea(playerIdx, dayIdx, s) {
  const done = isCheckedIn(playerIdx, dayIdx);
  const total = planData ? planData[playerIdx].params.days : 0;
  let count = 0;
  if (planData) for (let i = 0; i < total; i++) if (isCheckedIn(playerIdx, i)) count++;
  return `<div class="checkin-area">
    <button id="checkinBtn" class="checkin-btn${done?' done':''}" onclick="${done?'':` toggleCheckIn(${playerIdx},${dayIdx})`}">
      ${done ? `✅ ${s.checkinDone||'今天已完成 🎉'}` : `⬜ ${s.checkinMark||'标记今天已完成'}`}
    </button>
    <div class="checkin-progress" id="checkinProgress">
      ${(s.checkinProgress||(d,t)=>`已完成 <span>${d}/${t}</span> 天`)(count,total)}
    </div>
  </div>`;
}

function renderNotesArea(playerIdx, dayIdx, s) {
  const note = getNote(playerIdx, dayIdx);
  return `<div class="coach-notes-area">
    <div class="coach-notes-label">📝 ${s.notesLabel||'教练备注 / 今日记录'}</div>
    <textarea class="coach-notes-textarea" id="coachNotesTA" placeholder="${s.notesPlaceholder||'记录今天的训练感受、孩子的表现、需要改进的地方…'}">${note}</textarea>
    <div class="notes-save-hint" id="notesSaveHint">${s.notesHint||'内容自动保存'}</div>
  </div>`;
}

function bindNotesArea(playerIdx, dayIdx) {
  const ta = document.getElementById('coachNotesTA');
  const hint = document.getElementById('notesSaveHint');
  if (!ta) return;
  let timer;
  ta.addEventListener('input', () => {
    clearTimeout(timer);
    hint.textContent = STRINGS[currentLang].notesSaving || '保存中…';
    hint.className = 'notes-save-hint';
    timer = setTimeout(() => {
      saveNote(playerIdx, dayIdx, ta.value);
      hint.textContent = STRINGS[currentLang].notesSaved || '✓ 已保存';
      hint.className = 'notes-save-hint saved';
    }, 600);
  });
}

// =============================================
// CHECKIN & NOTES (localStorage)
// =============================================
let currentPlanKey = '';

function getPlanKey(allParams) {
  // 用第一个玩家的名字+天数作为 key
  const p = allParams[0];
  return `btp_${p.name}_${p.days}_${p.age}`;
}

function isCheckedIn(playerIdx, dayIdx) {
  const key = `${currentPlanKey}_p${playerIdx}_d${dayIdx}`;
  return localStorage.getItem(key) === '1';
}

function toggleCheckIn(playerIdx, dayIdx) {
  const key = `${currentPlanKey}_p${playerIdx}_d${dayIdx}`;
  const was = localStorage.getItem(key) === '1';
  localStorage.setItem(key, was ? '0' : '1');
  // refresh day display
  const btn = document.getElementById('checkinBtn');
  if (btn) updateCheckinBtn(playerIdx, dayIdx);
  // refresh calendar tab indicator
  refreshCalendarDots(playerIdx);
}

function updateCheckinBtn(playerIdx, dayIdx) {
  const done = isCheckedIn(playerIdx, dayIdx);
  const btn = document.getElementById('checkinBtn');
  if (!btn) return;
  const s = STRINGS[currentLang];
  if (done) {
    btn.className = 'checkin-btn done';
    btn.innerHTML = `✅ ${s.checkinDone || '今天已完成 🎉'}`;
    btn.onclick = null;
  } else {
    btn.className = 'checkin-btn';
    btn.innerHTML = `⬜ ${s.checkinMark || '标记今天已完成'}`;
    btn.onclick = () => toggleCheckIn(playerIdx, dayIdx);
  }
  // update progress
  const progEl = document.getElementById('checkinProgress');
  if (progEl) {
    const total = planData[playerIdx].params.days;
    let count = 0;
    for (let i = 0; i < total; i++) if (isCheckedIn(playerIdx, i)) count++;
    progEl.innerHTML = (s.checkinProgress || (d,t)=>`已完成 <span>${d}/${t}</span> 天`)(count, total);
  }
}

function refreshCalendarDots(playerIdx) {
  const dayTabs = document.querySelectorAll('#dayTabs .day-tab');
  dayTabs.forEach((tab, i) => {
    if (isCheckedIn(playerIdx, i)) tab.classList.add('done');
    else tab.classList.remove('done');
  });
}

function getNote(playerIdx, dayIdx) {
  const key = `${currentPlanKey}_note_p${playerIdx}_d${dayIdx}`;
  return localStorage.getItem(key) || '';
}

function saveNote(playerIdx, dayIdx, text) {
  const key = `${currentPlanKey}_note_p${playerIdx}_d${dayIdx}`;
  localStorage.setItem(key, text);
}

// =============================================
// EXPORT to PDF (print)
// =============================================
function exportDay(dayIdx) {
  window.print();
}

// =============================================
// GENERATE
// =============================================
function generatePlan() {
  const s = STRINGS[currentLang];
  const count = currentPlayerCount;

  // Collect params for each player
  const allParams = [];
  for (let p = 0; p < count; p++) {
    const ps = playerSelections[p] || {};
    // Normalise to ZH internal values
    const goalRaw = ps.goal || '综合';
    const hoopRaw = ps.hoop || '无';
    const fitRaw  = ps.fitness || '中等';
    const goalZH  = EN_TO_ZH_GOAL[goalRaw] || PT_TO_ZH_GOAL[goalRaw] || goalRaw;
    const hoopZH  = EN_TO_ZH_HOOP[hoopRaw] || PT_TO_ZH_HOOP[hoopRaw] || hoopRaw;
    const fitZH   = EN_TO_ZH_FITNESS[fitRaw] || PT_TO_ZH_FITNESS[fitRaw] || fitRaw;
    // Space: always stored as-is from data-val (ZH for zh, PT for pt, EN for en)
    const spaceRaw = ps.space || '家里';
    const nameEl = document.getElementById(`p${p}_name`);
    const dnames = currentLang==='zh' ? ['玩家1','玩家2','玩家3','玩家4','玩家5']
                 : currentLang==='pt' ? ['Jogador 1','Jogador 2','Jogador 3','Jogador 4','Jogador 5']
                 : ['Player 1','Player 2','Player 3','Player 4','Player 5'];
    allParams.push({
      name:     (nameEl && nameEl.value.trim()) || dnames[p],
      age:      parseInt(document.getElementById(`p${p}_age`).value),
      years:    parseFloat(document.getElementById(`p${p}_years`).value),
      days:     parseInt(document.getElementById(`p${p}_days`).value),
      totalMin: parseInt(document.getElementById(`p${p}_minutes`).value),
      goal:     goalZH,
      space:    spaceRaw,
      hoop:     hoopZH,
      fitness:  fitZH,
    });
  }

  document.getElementById('screen-input').classList.remove('active');
  document.getElementById('screen-loading').classList.add('active');
  document.getElementById('loadingText').textContent = s.loadingText;

  let tipIdx = 0;
  const tipEl = document.getElementById('loadingTip');
  const tipInterval = setInterval(() => {
    tipEl.textContent = s.loadingTips[tipIdx % s.loadingTips.length];
    tipIdx++;
  }, 220);

  setTimeout(() => {
    clearInterval(tipInterval);

    // Build days for each player (use max days across players)
    const maxDays = Math.max(...allParams.map(p => p.days));
    const allPlanData = allParams.map(params => {
      const days = [];
      for (let i = 0; i < params.days; i++) days.push(buildDay(i, params));
      return { params, days };
    });
    planData = allPlanData;
    currentPlanKey = getPlanKey(allParams);

    document.getElementById('screen-loading').classList.remove('active');
    document.getElementById('screen-result').classList.add('active');
    renderResult(allPlanData);
  }, 1600);
}

function goBack() {
  document.getElementById('screen-result').classList.remove('active');
  document.getElementById('screen-input').classList.add('active');
}

initPlayerPanels();
