<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>篮球训练计划 / Plano de Treino de Basquete</title>
<style>
  :root {
    --orange: #FF6B2B;
    --orange-light: #FF8F5A;
    --orange-dark: #E0551A;
    --bg: #FFFFFF;
    --bg-page: #F5F6FA;
    --card-bg: #FFFFFF;
    --card-hover: #FAFAFA;
    --border: #E8ECF2;
    --border-strong: #D0D8E4;
    --text-primary: #1A1E2E;
    --text-secondary: #4A5568;
    --text-muted: #8896A8;
    --accent-green: #18A96A;
    --accent-blue: #2563EB;
    --accent-yellow: #D97706;
    --accent-red: #DC2626;
    --accent-purple: #7C3AED;
    --shadow-sm: 0 1px 4px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Segoe UI', sans-serif;
    background: var(--bg-page);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== HEADER ===== */
  .app-header {
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    height: 64px;
    box-shadow: var(--shadow-sm);
  }

  .header-left { display: flex; align-items: center; gap: 12px; }

  .app-logo {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--orange), var(--orange-dark));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    box-shadow: 0 4px 12px rgba(255,107,43,0.3);
  }

  .app-title { font-size: 17px; font-weight: 700; color: var(--text-primary); }
  .app-subtitle { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

  /* Language switcher */
  .lang-switcher {
    display: flex;
    background: var(--bg-page);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .lang-btn {
    padding: 7px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--text-muted);
    transition: all 0.2s;
    display: flex; align-items: center; gap: 5px;
  }
  .lang-btn.active {
    background: var(--orange);
    color: white;
  }
  .lang-btn:hover:not(.active) { color: var(--text-primary); background: var(--border); }

  /* ===== MAIN LAYOUT ===== */
  .main-container {
    max-width: 960px;
    margin: 0 auto;
    padding: 28px 20px 80px;
  }

  /* ===== SCREENS ===== */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ===== INPUT SCREEN ===== */
  .input-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 16px;
    box-shadow: var(--shadow-sm);
  }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.2px;
    color: var(--orange);
    text-transform: uppercase;
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }
  @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }

  .form-group { display: flex; flex-direction: column; gap: 10px; }

  .form-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    display: flex; align-items: center; gap: 7px;
  }

  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 5px;
    background: var(--border);
    border-radius: 3px;
    outline: none;
    cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px; height: 20px;
    background: var(--orange);
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(255,107,43,0.4);
    transition: transform 0.15s;
    border: 3px solid white;
  }
  input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.15); }

  .slider-value {
    display: inline-block;
    background: linear-gradient(135deg, var(--orange), var(--orange-dark));
    color: white;
    font-weight: 700;
    font-size: 13px;
    padding: 3px 12px;
    border-radius: 20px;
    margin-top: 6px;
  }

  .option-group {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .option-btn {
    padding: 7px 15px;
    border: 1.5px solid var(--border-strong);
    border-radius: 20px;
    background: var(--bg);
    color: var(--text-secondary);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s;
  }
  .option-btn:hover { border-color: var(--orange); color: var(--orange); background: rgba(255,107,43,0.04); }
  .option-btn.selected {
    background: var(--orange);
    border-color: var(--orange);
    color: white;
    box-shadow: 0 3px 10px rgba(255,107,43,0.25);
  }

  /* ===== GENERATE BUTTON ===== */
  .generate-btn {
    width: 100%;
    padding: 17px;
    background: linear-gradient(135deg, var(--orange), var(--orange-dark));
    border: none;
    border-radius: 14px;
    color: white;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    box-shadow: 0 6px 20px rgba(255,107,43,0.35);
    margin-top: 4px;
  }
  .generate-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(255,107,43,0.45); }
  .generate-btn:active { transform: translateY(0); }

  /* ===== LOADING ===== */
  .loading-screen {
    display: none;
    text-align: center;
    padding: 100px 20px;
  }
  .loading-screen.active { display: block; }

  .loader {
    width: 52px; height: 52px;
    border: 4px solid var(--border);
    border-top-color: var(--orange);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 24px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text { font-size: 17px; font-weight: 600; color: var(--text-secondary); }
  .loading-sub { font-size: 13px; color: var(--text-muted); margin-top: 8px; }

  /* ===== RESULT SCREEN ===== */

  /* --- Summary Banner --- */
  .summary-banner {
    background: linear-gradient(135deg, var(--orange) 0%, #C0392B 100%);
    border-radius: 16px;
    padding: 28px 32px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 6px 24px rgba(255,107,43,0.3);
  }
  .summary-banner::after {
    content: '🏀';
    position: absolute;
    right: 24px; top: 50%;
    transform: translateY(-50%);
    font-size: 88px;
    opacity: 0.12;
    pointer-events: none;
  }
  .summary-banner h2 { font-size: 22px; font-weight: 800; color: white; margin-bottom: 6px; }
  .summary-banner p { font-size: 14px; color: rgba(255,255,255,0.88); margin-bottom: 18px; }
  .summary-stats { display: flex; gap: 10px; flex-wrap: wrap; }
  .stat-pill {
    background: rgba(255,255,255,0.22);
    border-radius: 20px;
    padding: 5px 13px;
    font-size: 13px;
    font-weight: 600;
    color: white;
    backdrop-filter: blur(4px);
  }

  /* --- Goals Card --- */
  .goals-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 16px;
    box-shadow: var(--shadow-sm);
  }

  .goals-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-top: 16px;
  }
  @media (max-width: 600px) { .goals-grid { grid-template-columns: 1fr 1fr; } }

  .goal-item {
    background: var(--bg-page);
    border-radius: 12px;
    padding: 16px 12px;
    text-align: center;
    border: 1px solid var(--border);
    transition: box-shadow 0.2s;
  }
  .goal-item:hover { box-shadow: var(--shadow-md); }
  .goal-icon { font-size: 26px; margin-bottom: 8px; }
  .goal-title { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; font-weight: 500; }
  .goal-value { font-size: 14px; font-weight: 700; color: var(--text-primary); }

  /* --- Calendar --- */
  .calendar-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 16px;
    box-shadow: var(--shadow-sm);
  }

  .day-tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 16px;
  }

  .day-tab {
    padding: 8px 12px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: var(--bg);
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    min-width: 52px;
  }
  .day-tab .day-num { font-size: 10px; opacity: 0.75; }
  .day-tab:hover { border-color: var(--orange-light); color: var(--orange); background: rgba(255,107,43,0.04); }
  .day-tab.active { background: var(--orange); border-color: var(--orange); color: white; box-shadow: 0 3px 10px rgba(255,107,43,0.3); }
  .day-tab.rest { border-color: #BFDBFE; color: var(--accent-blue); }
  .day-tab.rest.active { background: var(--accent-blue); border-color: var(--accent-blue); color: white; box-shadow: 0 3px 10px rgba(37,99,235,0.3); }
  .day-tab.light { border-color: #BBF7D0; color: var(--accent-green); }
  .day-tab.light.active { background: var(--accent-green); border-color: var(--accent-green); color: white; box-shadow: 0 3px 10px rgba(24,169,106,0.3); }

  /* --- Daily Detail --- */
  .daily-detail {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 16px;
    box-shadow: var(--shadow-sm);
  }

  .daily-header {
    display: flex; align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap; gap: 12px;
  }

  .daily-title { font-size: 20px; font-weight: 800; color: var(--text-primary); }
  .daily-theme-badge {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
  }

  .daily-goals {
    background: var(--bg-page);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 20px;
    border: 1px solid var(--border);
  }
  .daily-goals h4 { font-size: 12px; color: var(--orange); font-weight: 700; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.8px; }
  .goal-list { list-style: none; display: flex; flex-direction: column; gap: 7px; }
  .goal-list li { font-size: 13px; color: var(--text-secondary); display: flex; align-items: flex-start; gap: 8px; }
  .goal-list li::before { content: '✓'; color: var(--accent-green); font-weight: 700; flex-shrink: 0; margin-top: 1px; }

  /* --- Timeline --- */
  .timeline { position: relative; padding-left: 22px; }
  .timeline::before {
    content: '';
    position: absolute;
    left: 7px; top: 8px; bottom: 8px;
    width: 2px;
    background: var(--border);
    border-radius: 1px;
  }

  .timeline-block { position: relative; margin-bottom: 18px; }
  .timeline-block::before {
    content: '';
    position: absolute;
    left: -18px; top: 12px;
    width: 10px; height: 10px;
    border-radius: 50%;
    border: 2px solid white;
    box-shadow: 0 0 0 1px var(--border);
  }
  .timeline-block.warmup::before   { background: #D97706; }
  .timeline-block.skill::before    { background: var(--orange); }
  .timeline-block.tech::before     { background: var(--accent-purple); }
  .timeline-block.fitness::before  { background: var(--accent-green); }
  .timeline-block.core::before     { background: var(--accent-blue); }
  .timeline-block.cooldown::before { background: var(--text-muted); }

  .block-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 10px;
  }
  .block-time {
    font-size: 11px; font-weight: 700; color: var(--text-muted);
    font-variant-numeric: tabular-nums;
    min-width: 95px;
    background: var(--bg-page);
    padding: 2px 8px;
    border-radius: 5px;
    border: 1px solid var(--border);
  }
  .block-title { font-size: 15px; font-weight: 700; flex: 1; color: var(--text-primary); }
  .block-duration {
    font-size: 12px; color: var(--text-muted);
    background: var(--bg-page);
    padding: 3px 10px; border-radius: 10px;
    border: 1px solid var(--border);
  }

  .block-content {
    background: var(--bg-page);
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .exercise-row {
    display: grid;
    grid-template-columns: 1fr auto auto auto;
    align-items: center;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    gap: 10px;
    transition: background 0.12s;
  }
  .exercise-row:last-child { border-bottom: none; }
  .exercise-row:hover { background: rgba(255,107,43,0.03); }
  .ex-name { font-size: 13px; font-weight: 500; color: var(--text-primary); }
  .ex-detail { font-size: 12px; color: var(--orange); font-weight: 700; white-space: nowrap; }
  .ex-rest { font-size: 11px; color: var(--text-muted); white-space: nowrap; }
  .ex-intensity { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .intensity-low  { background: var(--accent-green); }
  .intensity-med  { background: var(--accent-yellow); }
  .intensity-high { background: var(--orange); }
  .intensity-max  { background: var(--accent-red); }

  /* --- Back Button --- */
  .back-btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 9px 16px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text-secondary);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s;
    margin-bottom: 20px;
  }
  .back-btn:hover { background: var(--bg-page); color: var(--text-primary); border-color: var(--border-strong); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }

  /* Animations */
  .fade-in { animation: fadeIn 0.35s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .rest-day-box {
    text-align: center;
    padding: 52px 24px;
    background: var(--bg-page);
    border-radius: 12px;
    border: 1px solid var(--border);
  }
  .rest-day-box .big-icon { font-size: 56px; margin-bottom: 16px; }
  .rest-day-box h3 { font-size: 20px; font-weight: 800; margin-bottom: 8px; color: var(--text-primary); }
  .rest-day-box p { font-size: 13px; color: var(--text-secondary); max-width: 340px; margin: 0 auto; line-height: 1.7; }

  .tip-box {
    background: rgba(255,107,43,0.05);
    border: 1px solid rgba(255,107,43,0.2);
    border-radius: 10px;
    padding: 13px 16px;
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 16px;
    line-height: 1.6;
  }
  .tip-box strong { color: var(--orange); }

  /* ===== INTRO TEXT ===== */
  .page-intro {
    margin-bottom: 24px;
  }
  .page-intro h1 {
    font-size: 26px;
    font-weight: 800;
    color: var(--text-primary);
    margin-bottom: 6px;
  }
  .page-intro p {
    font-size: 14px;
    color: var(--text-muted);
  }

  /* ===== MOBILE / TABLET RESPONSIVE ===== */

  /* iPad (768px – 1024px) */
  @media (max-width: 1024px) {
    .main-container { max-width: 100%; padding: 20px 16px 80px; }
    .goals-grid { grid-template-columns: repeat(3, 1fr); }
  }

  /* Mobile (≤ 600px) */
  @media (max-width: 600px) {
    /* Header */
    .app-header { padding: 0 14px; height: 56px; }
    .app-logo { width: 34px; height: 34px; font-size: 17px; border-radius: 8px; }
    .app-title { font-size: 15px; }
    .app-subtitle { display: none; }
    .lang-btn { padding: 6px 10px; font-size: 12px; }

    /* Container */
    .main-container { padding: 14px 12px 100px; }

    /* Intro */
    .page-intro h1 { font-size: 20px; }
    .page-intro p { font-size: 13px; }

    /* Cards */
    .input-card { padding: 18px 14px; border-radius: 14px; }
    .form-grid { grid-template-columns: 1fr; gap: 18px; }

    /* Sliders – bigger touch target */
    input[type="range"] { height: 6px; }
    input[type="range"]::-webkit-slider-thumb { width: 24px; height: 24px; }

    /* Option buttons – bigger tap area */
    .option-btn { padding: 9px 14px; font-size: 14px; border-radius: 22px; }

    /* Generate button */
    .generate-btn { padding: 16px; font-size: 15px; border-radius: 14px; }

    /* Summary banner */
    .summary-banner { padding: 20px 18px; border-radius: 14px; }
    .summary-banner h2 { font-size: 18px; }
    .summary-banner p { font-size: 13px; }
    .summary-banner::after { font-size: 64px; right: 14px; }
    .stat-pill { font-size: 12px; padding: 4px 10px; }

    /* Goals */
    .goals-card, .calendar-card, .daily-detail { padding: 16px 14px; border-radius: 14px; }
    .goals-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
    .goal-item { padding: 12px 8px; }
    .goal-icon { font-size: 22px; }
    .goal-title { font-size: 10px; }
    .goal-value { font-size: 13px; }

    /* Day tabs – scrollable row */
    .day-tabs {
      flex-wrap: nowrap;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 6px;
      gap: 6px;
      scrollbar-width: none;
    }
    .day-tabs::-webkit-scrollbar { display: none; }
    .day-tab {
      min-width: 48px;
      flex-shrink: 0;
      padding: 8px 10px;
      font-size: 11px;
    }

    /* Daily detail */
    .daily-title { font-size: 17px; }
    .daily-theme-badge { font-size: 11px; padding: 5px 10px; }

    /* Timeline */
    .timeline { padding-left: 18px; }
    .block-time { font-size: 10px; min-width: 80px; }
    .block-title { font-size: 14px; }
    .block-duration { font-size: 11px; }

    /* Exercise rows – stack on very small screens */
    .exercise-row {
      grid-template-columns: 1fr auto;
      grid-template-rows: auto auto;
      gap: 4px 8px;
      padding: 10px 12px;
    }
    .ex-name { grid-column: 1; grid-row: 1; font-size: 13px; }
    .ex-detail { grid-column: 2; grid-row: 1; font-size: 12px; }
    .ex-rest { grid-column: 1; grid-row: 2; font-size: 11px; }
    .ex-intensity { grid-column: 2; grid-row: 2; justify-self: end; }

    /* Back button */
    .back-btn { padding: 9px 14px; font-size: 13px; }

    /* Rest day */
    .rest-day-box { padding: 36px 16px; }
    .rest-day-box .big-icon { font-size: 44px; }
    .rest-day-box h3 { font-size: 18px; }

    /* Tip box */
    .tip-box { font-size: 12px; padding: 12px 14px; }
  }

  /* Safe area for iPhone notch / home bar */
  @supports (padding-bottom: env(safe-area-inset-bottom)) {
    .main-container { padding-bottom: calc(80px + env(safe-area-inset-bottom)); }
  }
</style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header class="app-header">
  <div class="header-left">
    <div class="app-logo">🏀</div>
    <div>
      <div class="app-title" id="headerTitle">篮球训练计划</div>
      <div class="app-subtitle" id="headerSub">分钟级精准课表 · 按需定制</div>
    </div>
  </div>
  <div class="lang-switcher">
    <button class="lang-btn active" id="btnZH" onclick="setLang('zh')">🇨🇳 中文</button>
    <button class="lang-btn" id="btnPT" onclick="setLang('pt')">🇵🇹 PT</button>
  </div>
</header>

<!-- ===== INPUT SCREEN ===== -->
<div id="screen-input" class="screen active">
  <div class="main-container">

    <div class="page-intro fade-in">
      <h1 id="introTitle">生成专属训练计划</h1>
      <p id="introSub">填写孩子的基本信息，自动生成精确到每分钟的篮球训练课表。</p>
    </div>

    <div class="input-card fade-in">
      <div class="section-label" id="secBasic">基本信息</div>
      <div class="form-grid">

        <div class="form-group">
          <label class="form-label">🧒 <span id="lblAge">孩子年龄</span></label>
          <input type="range" id="age" min="6" max="18" value="10" oninput="updateSlider('age','ageVal')">
          <div><span class="slider-value" id="ageVal">10</span></div>
        </div>

// =============================================
// TRAINING ENGINE (language-aware)
// =============================================

function getLevel(age, years) {
  const base = years + (age - 8) * 0.3;
  if (base < 1.5) return 'L1';
  if (base < 4)   return 'L2';
  if (base < 8)   return 'L3';
  return 'L4';
}

function getTheme(dayIndex, goalZH) {
  const s = STRINGS[currentLang];
  const ptGoalMap = { '综合':null,'控球':'Dribble','投篮':'Arremesso','体能':'Físico' };
  if (currentLang === 'pt') {
    const ptGoal = PT_TO_ZH_GOAL[goalZH] ? goalZH : (ptGoalMap[goalZH] || null);
    const ptKey = ptGoal || goalZH;
    if (s.themesGoalMap[ptKey]) return s.themesGoalMap[ptKey][dayIndex % 7];
    return s.themes[dayIndex % 7];
  }
  const zhThemes = STRINGS.zh.themes;
  const zhMap = STRINGS.zh.themesGoalMap;
  if (zhMap[goalZH]) return zhMap[goalZH][dayIndex % 7];
  return zhThemes[dayIndex % 7];
}

function getThemeZH(themeDisplay) {
  // Convert displayed theme back to ZH key for engine logic
  const ptToZH = {
    'Dribble':'控球基础','Passos e Equilíbrio':'脚步与平衡','Arremesso':'出手手型',
    'Jogo Combinado':'综合实战','Recuperação Leve':'轻松恢复','Desafio Intenso':'强化挑战','Descanso Total':'完全休息'
  };
  return ptToZH[themeDisplay] || themeDisplay;
}

function getProgression(dayIndex) {
  const week = Math.floor(dayIndex / 7);
  return { setBonus: week, timeBonus: week * 5 };
}

function isRestTheme(theme) {
  return theme === '完全休息' || theme === 'Descanso Total';
}
function isLightTheme(theme) {
  return theme === '轻松恢复' || theme === 'Recuperação Leve';
}

function fmtTime(min) {
  return `${String(Math.floor(min)).padStart(2,'0')}:${String(Math.round((min%1)*60)).padStart(2,'0')}`;
}

function buildDay(dayIndex, params) {
  const { age, years, totalMin, goal, hoop, fitness } = params;
  const level = getLevel(age, years);
  const theme = getTheme(dayIndex, goal);
  const prog = getProgression(dayIndex);
  const s = STRINGS[currentLang];

  const isRest = isRestTheme(theme);
  const isLight = isLightTheme(theme);
  const themeZH = getThemeZH(theme);

  if (isRest) {
    return { dayIndex, theme, isRest: true, title: s.restTitle, tips: s.restTips };
  }

  // Determine hoop state
  const hoopZH = currentLang === 'pt' ? (PT_TO_ZH_HOOP[hoop] || '无') : hoop;
  const fitnessZH = currentLang === 'pt' ? (PT_TO_ZH_FITNESS[fitness] || '中等') : fitness;

  let cursor = 0;
  const blocks = [];

  // --- WARMUP ---
  const warmDur = level === 'L1' ? 8 : 10;
  blocks.push({ type: 'warmup', title: s.blockTitles.warmup, dur: warmDur, startMin: cursor,
    exercises: s.exercises.warmupList(warmDur) });
  cursor += warmDur;

  // --- SKILL ---
  const skillDur = { L1:10, L2:12, L3:14, L4:16 }[level];
  const tExtra = 50 + prog.timeBonus;
  let skillEx;
  if (themeZH === '出手手型') skillEx = s.exercises.skillShoot;
  else skillEx = s.exercises.skillDribble(tExtra, level);
  blocks.push({ type: 'skill', title: s.blockTitles.skill, dur: skillDur, startMin: cursor, exercises: skillEx });
  cursor += skillDur;

  // --- TECH ---
  const techDur = { L1:12, L2:15, L3:17, L4:20 }[level];
  const sets = (level === 'L1' ? 3 : level === 'L2' ? 4 : 5) + prog.setBonus;
  const t1 = 30 + prog.timeBonus, t2 = 40 + prog.timeBonus;
  let techEx;
  if (themeZH === '控球基础') techEx = s.exercises.techControl(sets, t1, t2);
  else if (themeZH === '脚步与平衡') techEx = s.exercises.techFootwork(sets, t1);
  else if (themeZH === '出手手型') {
    const r1=40+prog.setBonus*10, r2=30+prog.setBonus*5;
    const r3 = hoopZH==='有' ? 15+prog.setBonus*3 : 20+prog.setBonus*5;
    techEx = s.exercises.techShoot(sets,r1,r2,r3, currentLang==='pt'?(hoopZH==='有'?'Com aro':'Sem aro'):hoopZH);
  } else if (themeZH === '综合实战' || themeZH === '强化挑战') {
    techEx = s.exercises.techCombined(sets, t1, t2, themeZH==='强化挑战'?1:0);
  } else if (isLight) {
    techEx = s.exercises.techLight;
  } else {
    techEx = s.exercises.techControl(sets, t1, t2);
  }
  blocks.push({ type: 'tech', title: s.blockTitles.tech, dur: techDur, startMin: cursor, exercises: techEx });
  cursor += techDur;

  // --- FITNESS ---
  const fitBaseDur = { L1:8, L2:10, L3:12, L4:14 }[level];
  const fitDur = isLight ? Math.floor(fitBaseDur * 0.6) : fitBaseDur;
  const rounds = isLight ? 6 : ((level==='L1'?8:10)+prog.setBonus);
  const workSec = fitnessZH==='较强'?25:fitnessZH==='中等'?20:15;
  const restSec = fitnessZH==='较强'?15:fitnessZH==='中等'?20:25;
  const moves = s.exercises.fitnessMoves(level, isLight);
  const sel = []; for (let i=0;i<rounds;i++) sel.push(moves[i%moves.length]);
  const grouped = []; let cur2 = null;
  sel.forEach(m => { if(cur2&&cur2.name===m){cur2.rounds++;}else{cur2={name:m,rounds:1};grouped.push(cur2);} });
  const fitEx = grouped.map(g => ({
    name: g.name,
    detail: s.fitDetail(workSec, g.rounds),
    rest: s.fitRest(restSec),
    intensity: isLight?'med':'high'
  }));
  blocks.push({ type: 'fitness', title: s.blockTitles.fitness, dur: fitDur, startMin: cursor, exercises: fitEx });
  cursor += fitDur;

  // --- CORE ---
  if (!isLight) {
    const coreRounds = level==='L1'?2:3;
    blocks.push({ type:'core', title:s.blockTitles.core, dur:8, startMin:cursor, exercises:s.exercises.coreMain(coreRounds) });
  } else {
    blocks.push({ type:'core', title:s.blockTitles.coreLight, dur:8, startMin:cursor, exercises:s.exercises.coreLight });
  }
  cursor += 8;

  // --- COOLDOWN ---
  blocks.push({ type:'cooldown', title:s.blockTitles.cooldown, dur:5, startMin:cursor, exercises:s.exercises.cooldown });
  cursor += 5;

  const goals = s.dayGoals(theme, currentLang==='pt'?(hoopZH==='有'?'Com aro':'Sem aro'):hoopZH);

  return { dayIndex, theme, themeZH, level, isRest:false, isLight, blocks, goals, totalActual:cursor };
}

function renderResult(params, days) {
  const s = STRINGS[currentLang];
  const level = getLevel(params.age, params.years);
  const lvlName = s.levelNames[level];
  const goals = s.overallGoals(lvlName);

  // Goal / space display values
  const hoopDisp = currentLang==='pt'
    ? (params.hoop==='无'?'Sem aro':'Com aro')
    : params.hoop;
  const fitnessDisp = currentLang==='pt'
    ? PT_TO_ZH_FITNESS[params.fitness] || params.fitness
    : params.fitness;

  let html = `
  <div class="summary-banner fade-in">
    <h2>${s.bannerAge(params.age, params.years, params.days)}</h2>
    <p>${s.bannerSub(lvlName, params.goal, params.space)}</p>
    <div class="summary-stats">
      ${s.pills(params.days, params.totalMin, hoopDisp, fitnessDisp).map(p=>`<div class="stat-pill">${p}</div>`).join('')}
    </div>
  </div>`;

  html += `<div class="goals-card fade-in">
    <div class="section-label">${s.overallGoalsLabel}</div>
    <div class="goals-grid">
      ${goals.map(g=>`<div class="goal-item"><div class="goal-icon">${g.icon}</div><div class="goal-title">${g.title}</div><div class="goal-value">${g.value}</div></div>`).join('')}
    </div>
  </div>`;

  html += `<div class="calendar-card fade-in">
    <div class="section-label">${s.calendarLabel}</div>
    <div class="day-tabs" id="dayTabs">
      ${days.map((d,i)=>{
        const cls = d.isRest ? 'rest' : (d.isLight ? 'light' : '');
        const icon = d.isRest ? '😴' : (d.isLight ? '🌿' : '🔥');
        return `<button class="day-tab ${cls}${i===0?' active':''}" onclick="switchDay(${i})">${icon}<span class="day-num">D${i+1}</span></button>`;
      }).join('')}
    </div>
  </div>`;

  html += `<div id="dailyDetail" class="fade-in"></div>`;
  document.getElementById('result-content').innerHTML = html;
  renderDay(days[0]);
}

function switchDay(idx) {
  document.querySelectorAll('.day-tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  renderDay(planData[idx]);
  document.getElementById('dailyDetail').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function renderDay(day) {
  const s = STRINGS[currentLang];
  const container = document.getElementById('dailyDetail');
  container.innerHTML = '';
  container.classList.remove('fade-in');
  void container.offsetWidth;
  container.classList.add('fade-in');

  if (day.isRest) {
    const thStyle = THEME_COLORS[day.theme] || { bg:'rgba(37,99,235,0.10)', color:'#2563EB' };
    container.innerHTML = `
      <div class="daily-detail">
        <div class="daily-header">
          <div><div class="daily-title">Day ${day.dayIndex+1} · ${day.title}</div></div>
          <div class="daily-theme-badge" style="background:${thStyle.bg};color:${thStyle.color}">😴 ${day.title}</div>
        </div>
        <div class="rest-day-box">
          <div class="big-icon">🛌</div>
          <h3>${s.restH3}</h3>
          <p>${day.tips.join('<br>')}</p>
        </div>
      </div>`;
    return;
  }

  const thStyle = THEME_COLORS[day.theme] || { bg:'rgba(255,107,43,0.10)', color:'#E0551A' };

  let html = `<div class="daily-detail">
    <div class="daily-header">
      <div>
        <div class="daily-title">Day ${day.dayIndex+1} · ${day.theme}</div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:4px">${s.estimateLabel} ${day.totalActual} ${s.minLabel}</div>
      </div>
      <div class="daily-theme-badge" style="background:${thStyle.bg};color:${thStyle.color}">${day.theme}</div>
    </div>`;

  if (day.goals.length > 0) {
    html += `<div class="daily-goals">
      <h4>${s.todayGoalLabel}</h4>
      <ul class="goal-list">${day.goals.map(g=>`<li>${g}</li>`).join('')}</ul>
    </div>`;
  }

  html += `<div class="timeline">`;
  day.blocks.forEach(block => {
    const endMin = block.startMin + block.dur;
    html += `<div class="timeline-block ${block.type}">
      <div class="block-header">
        <span class="block-time">${fmtTime(block.startMin)} – ${fmtTime(endMin)}</span>
        <span class="block-title">${block.title}</span>
        <span class="block-duration">${block.dur} ${s.minLabel}</span>
      </div>
      <div class="block-content">
        ${block.exercises.map(ex=>`
          <div class="exercise-row">
            <span class="ex-name">${ex.name}</span>
            <span class="ex-detail">${ex.detail}</span>
            <span class="ex-rest">${ex.rest}</span>
            <span class="ex-intensity intensity-${ex.intensity}"></span>
          </div>`).join('')}
      </div>
    </div>`;
  });
  html += `</div>`;

  const tip = s.tips[day.theme];
  if (tip) html += `<div class="tip-box"><strong>${s.coachTip}</strong>${tip}</div>`;

  html += `</div>`;
  container.innerHTML = html;
}

// =============================================
// GENERATE
// =============================================
function generatePlan() {
  const s = STRINGS[currentLang];
  const params = {
    age:      parseInt(document.getElementById('age').value),
    years:    parseFloat(document.getElementById('years').value),
    days:     parseInt(document.getElementById('days').value),
    totalMin: parseInt(document.getElementById('minutes').value),
    goal:     selections.goal,
    space:    selections.space,
    hoop:     selections.hoop,
    fitness:  selections.fitness,
  };

  document.getElementById('screen-input').classList.remove('active');
  document.getElementById('screen-loading').classList.add('active');
  document.getElementById('loadingText').textContent = s.loadingText;

  let tipIdx = 0;
  const tipEl = document.getElementById('loadingTip');
  const tipInterval = setInterval(() => {
    tipEl.textContent = s.loadingTips[tipIdx % s.loadingTips.length];
    tipIdx++;
  }, 220);

  setTimeout(() => {
    clearInterval(tipInterval);
    const days = [];
    for (let i = 0; i < params.days; i++) days.push(buildDay(i, params));
    planData = days;

    document.getElementById('screen-loading').classList.remove('active');
    document.getElementById('screen-result').classList.add('active');
    renderResult(params, days);
  }, 1600);
}

// Init
updateSlider('age','ageVal');
updateSlider('years','yearsVal');
updateSlider('days','daysVal');
updateSlider('minutes','minutesVal');
</script>
